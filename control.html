<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Pro — Control</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-control.svg" type="image/svg+xml">
  <meta name="theme-color" content="#1a2540">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Control">
  <link rel="apple-touch-icon" href="/icon-control.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0a08;
      --card-bg:  #13110e;
      --border:   #2a2318;
      --gold:     #c8a44e;
      --gold-dim: rgba(200,164,78,0.14);
      --text:     #e8e0d0;
      --muted:    #7a6a4a;
      --green:    #4caf50;
      --red:      #ef5350;
      --r:        12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
    }

    /* ─── LOGIN ─── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .login-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-box h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: var(--gold);
      margin-bottom: 0.25rem;
    }

    .login-box p {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 2rem;
    }

    .login-box input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      margin-bottom: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-box input[type="password"]:focus { border-color: var(--gold); }

    .btn-gold {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--gold);
      color: #0c0a08;
      border: none;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-gold:hover { opacity: 0.85; }

    .login-error {
      color: var(--red);
      font-size: 0.82rem;
      margin-top: 0.75rem;
      display: none;
    }

    /* ─── DASHBOARD ─── */
    #dashboard { display: none; }

    header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .hd-left h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      color: var(--gold);
      line-height: 1.2;
    }

    .hd-left span {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .btn-logout {
      padding: 0.45rem 1.1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover { border-color: var(--gold); color: var(--gold); }

    main {
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .clients-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 1.5rem;
    }

    /* ─── CARD ─── */
    .client-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.5rem;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      color: var(--gold);
      line-height: 1.2;
    }

    .card-slug {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      margin-top: 5px;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .status-dot.online  { background: var(--green); box-shadow: 0 0 7px var(--green); }
    .status-dot.offline { background: var(--red); }

    .card-links {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .card-link {
      padding: 0.3rem 0.7rem;
      background: var(--gold-dim);
      border: 1px solid rgba(200,164,78,0.28);
      border-radius: 6px;
      color: var(--gold);
      font-size: 0.75rem;
      text-decoration: none;
      transition: background 0.2s;
    }

    .card-link:hover { background: rgba(200,164,78,0.24); }

    .section-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.55rem;
    }

    /* ─── MODE SELECTOR ─── */
    .mode-selector {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 1.25rem;
    }

    .mode-selector input[type="radio"] { display: none; }

    .mode-selector label {
      flex: 1;
      padding: 0.48rem 0.2rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.76rem;
      text-align: center;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
      user-select: none;
    }

    .mode-selector input[type="radio"]:checked + label {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold);
      font-weight: 500;
    }

    /* ─── TOGGLES ─── */
    .toggles {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 1.25rem;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label { font-size: 0.84rem; }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle input:checked ~ .toggle-track { background: var(--gold); }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      pointer-events: none;
    }

    .toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

    /* ─── FEAT LIST (licences) ─── */
    .feat-list {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      margin-bottom: 1.25rem;
    }
    .feat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .feat-label { font-size: 0.84rem; }

    /* ─── PASSWORD ─── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    .pw-row {
      display: flex;
      gap: 0.5rem;
    }

    .pw-row input[type="password"] {
      flex: 1;
      padding: 0.52rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.84rem;
      outline: none;
      transition: border-color 0.2s;
      min-width: 0;
    }

    .pw-row input[type="password"]:focus { border-color: var(--gold); }

    .btn-update {
      padding: 0.52rem 0.9rem;
      background: var(--gold);
      color: #0c0a08;
      border: none;
      border-radius: 6px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .btn-update:hover   { opacity: 0.85; }
    .btn-update:disabled { opacity: 0.45; cursor: default; }

    .pw-feedback {
      font-size: 0.73rem;
      margin-top: 0.35rem;
      min-height: 1em;
    }

    .pw-feedback.ok  { color: var(--green); }
    .pw-feedback.err { color: var(--red); }

    /* ─── LANGUAGES ─── */
    .lang-section {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      margin-bottom: 1.25rem;
    }
    .lang-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .lang-label { font-size: 0.84rem; }
    .lang-sel {
      padding: 0.3rem 0.6rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .lang-sel:focus { border-color: var(--gold); }

    /* ─── LANG TOGGLES ─── */
    .lang-toggles {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 1.25rem;
    }
    .lang-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .lang-toggle-label { font-size: 0.84rem; }

    /* ─── MODAL ─── */
    #lang-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    #lang-modal.open { display: flex; }
    .modal-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 380px;
    }
    .modal-box h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }
    .modal-box p { font-size: 0.85rem; color: var(--text); margin-bottom: 1rem; line-height: 1.5; }
    .modal-sel {
      width: 100%;
      padding: 0.52rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.84rem;
      outline: none;
      margin-bottom: 1.25rem;
      transition: border-color 0.2s;
    }
    .modal-sel:focus { border-color: var(--gold); }
    .modal-actions { display: flex; gap: 0.5rem; }
    .modal-confirm {
      flex: 1;
      padding: 0.6rem 1rem;
      background: var(--gold);
      color: #0c0a08;
      border: none;
      border-radius: 6px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .modal-confirm:hover { opacity: 0.85; }
    .modal-cancel {
      flex: 1;
      padding: 0.6rem 1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: 0.84rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-cancel:hover { border-color: var(--gold); color: var(--gold); }

    @media (max-width: 500px) {
      main { padding: 1rem; }
      .clients-grid { grid-template-columns: 1fr; }
      header { padding: 0.875rem 1rem; }
    }
  </style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="login-screen">
  <div class="login-box">
    <h1>Menu Pro</h1>
    <p>Control — Accès privé</p>
    <input type="password" id="login-pw" placeholder="Mot de passe" autocomplete="current-password">
    <button class="btn-gold" onclick="tryLogin()">Connexion</button>
    <div class="login-error" id="login-error">Mot de passe incorrect</div>
  </div>
</div>

<!-- ══════════════ DASHBOARD ══════════════ -->
<div id="dashboard">
  <header>
    <div class="hd-left">
      <h2>Menu Pro — Control</h2>
      <span id="clock"></span>
    </div>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
  </header>
  <main>
    <div class="clients-grid" id="clients-grid"></div>
  </main>
</div>

<!-- ══════════════ MODAL LANGUE ══════════════ -->
<div id="lang-modal">
  <div class="modal-box">
    <h3>Langue en cours d'utilisation</h3>
    <p id="modal-msg"></p>
    <select class="modal-sel" id="modal-sel"></select>
    <div class="modal-actions">
      <button class="modal-confirm" onclick="confirmLangDisable()">Confirmer</button>
      <button class="modal-cancel" onclick="cancelLangDisable()">Annuler</button>
    </div>
  </div>
</div>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// ══════════════════════════════════════════
// CONFIGURATION
// ══════════════════════════════════════════

const CONTROL_HASH = '1255b264090c1727a6cb91c5797fc62f20ad8378249076fa9351329c321c8067';

const CLIENTS = [
  {
    name: 'Mozart Coffee Lounge',
    slug: 'mozart',
    url:  'https://mozart-cafe-menu.vercel.app',
    langs: ['el','fr','en','ar','de'],
    firebaseConfig: {
      apiKey:            "AIzaSyAOuYRxE39KDgmizSdqCzAglWrkL4DZXYQ",
      authDomain:        "mozart-cafe-ae8e0.firebaseapp.com",
      databaseURL:       "https://mozart-cafe-ae8e0-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "mozart-cafe-ae8e0",
      storageBucket:     "mozart-cafe-ae8e0.firebasestorage.app",
      messagingSenderId: "89531105163",
      appId:             "1:89531105163:web:224863264ff5eebdb9b98e"
    }
  },
  {
    name: 'Café Élysée',
    slug: 'cafe-elysee',
    url:  'https://cafe-elysee-dye1.vercel.app',
    langs: ['el','fr','en','ar','de'],
    firebaseConfig: {
      apiKey:            "AIzaSyCcN6eCTaD_PlTJjO0aKbS1Y3rrDnEwp7s",
      authDomain:        "cafe-elysee-e186c.firebaseapp.com",
      databaseURL:       "https://cafe-elysee-e186c-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "cafe-elysee-e186c",
      storageBucket:     "cafe-elysee-e186c.firebasestorage.app",
      messagingSenderId: "240164681993",
      appId:             "1:240164681993:web:13654bfe96f1c83db43bd8"
    }
  }
];

const LANG_LABELS = { el: 'Ελληνικά', fr: 'Français', en: 'English', de: 'Deutsch', ar: 'العربية' };

// ══════════════════════════════════════════
// SHA-256
// ══════════════════════════════════════════

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ══════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════

async function tryLogin() {
  const pw   = document.getElementById('login-pw').value;
  const hash = await sha256(pw);
  if (hash === CONTROL_HASH) {
    sessionStorage.setItem('ctrl_auth', '1');
    showDashboard();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

document.getElementById('login-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});

function logout() {
  sessionStorage.removeItem('ctrl_auth');
  location.reload();
}

// ══════════════════════════════════════════
// CLOCK
// ══════════════════════════════════════════

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }) +
    ' · ' +
    now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ══════════════════════════════════════════
// FIREBASE — instances par client
// ══════════════════════════════════════════

const _dbs = {};

function getDb(slug) {
  if (!_dbs[slug]) {
    const client      = CLIENTS.find(c => c.slug === slug);
    const existing    = firebase.apps.find(a => a.name === slug);
    const app         = existing || firebase.initializeApp(client.firebaseConfig, slug);
    _dbs[slug]        = firebase.database(app);
  }
  return _dbs[slug];
}

// ══════════════════════════════════════════
// STATUS
// ══════════════════════════════════════════

async function checkStatus(url) {
  try {
    await fetch(url, { method: 'HEAD', mode: 'no-cors', cache: 'no-store' });
    return true;
  } catch {
    return false;
  }
}

// ══════════════════════════════════════════
// BUILD CARD HTML
// ══════════════════════════════════════════

function buildCard(client) {
  const s  = client.slug;
  const id = s.replace(/-/g, '_');
  const langs    = client.langs || ['fr'];
  const langOpts = langs.map(l => `<option value="${l}">${LANG_LABELS[l]||l}</option>`).join('');
  const tog = (key, label, fn) => `
    <div class="feat-row">
      <span class="feat-label">${label}</span>
      <label class="toggle">
        <input type="checkbox" id="${key}-${id}" onchange="${fn}">
        <div class="toggle-track"></div><div class="toggle-thumb"></div>
      </label>
    </div>`;
  return `
<div class="client-card" id="card-${id}">
  <div class="card-header">
    <div>
      <div class="card-name">${client.name}</div>
      <div class="card-slug">${s}</div>
    </div>
    <div class="status-dot" id="status-${id}"></div>
  </div>

  <div class="card-links">
    <a class="card-link" href="${client.url}"            target="_blank">Menu ↗</a>
    <a class="card-link" href="${client.url}/admin.html" target="_blank">Admin ↗</a>
    <a class="card-link" href="${client.url}/app.html"   target="_blank">Serveur ↗</a>
  </div>

  <div class="section-label">🎟️ Modes disponibles (licence)</div>
  <div class="feat-list">
    ${tog('feat-mode-order',  '🛒 Mode Commande', "writeFeatureMode('"+s+"','order',this.checked)")}
    ${tog('feat-mode-sonet',  '🔔 Mode Sonnette', "writeFeatureMode('"+s+"','sonet',this.checked)")}
    ${tog('feat-mode-simple', '🖼️ Mode Photo',    "writeFeatureMode('"+s+"','simple',this.checked)")}
    ${tog('feat-mode-paper',  '📄 Mode Papier',   "writeFeatureMode('"+s+"','paper',this.checked)")}
  </div>

  <div class="section-label">⚙️ Boutons disponibles (licence)</div>
  <div class="feat-list">
    ${tog('feat-btn-callBtn', '🔔 Bouton sonnette',   "writeFeatureBtn('"+s+"','callBtn',this.checked)")}
    ${tog('feat-btn-orderUI', '🛒 Interface commande',"writeFeatureBtn('"+s+"','orderUI',this.checked)")}
    ${tog('feat-btn-photos',  '🖼️ Photos produits',   "writeFeatureBtn('"+s+"','photos',this.checked)")}
  </div>

  <hr class="divider">

  <div class="section-label">🌐 Langues disponibles</div>
  <div class="lang-toggles">
    ${langs.map(l => `
    <div class="lang-toggle-row">
      <span class="lang-toggle-label">${LANG_LABELS[l]||l}</span>
      <label class="toggle">
        <input type="checkbox" id="lang-en-${l}-${id}" checked
               onchange="onLangToggle('${s}','${l}',this)">
        <div class="toggle-track"></div><div class="toggle-thumb"></div>
      </label>
    </div>`).join('')}
  </div>

  <div class="section-label">🌐 Langues — Paramètres</div>
  <div class="lang-section">
    <div class="lang-row">
      <span class="lang-label">Langue affichée (1ère visite)</span>
      <select id="default-lang-${id}" class="lang-sel" onchange="writeDefaultLang('${s}',this.value)">${langOpts}</select>
    </div>
    <div class="lang-row">
      <span class="lang-label">Langue admin (saisie)</span>
      <select id="primary-lang-${id}" class="lang-sel" onchange="writePrimaryLang('${s}',this.value)">${langOpts}</select>
    </div>
  </div>

  <hr class="divider">

  <div class="section-label">Mot de passe admin</div>
  <div class="pw-row">
    <input type="password" id="pw-${id}" placeholder="Nouveau mot de passe">
    <button class="btn-update" onclick="updatePassword('${s}')">Mettre à jour</button>
  </div>
  <div class="pw-feedback" id="pwfb-${id}"></div>
</div>`;
}

// ══════════════════════════════════════════
// ÉTAT PAR CLIENT (langues)
// ══════════════════════════════════════════

const _clientState = {};

function getClientState(slug) {
  if (!_clientState[slug]) _clientState[slug] = { defaultLang: null, primaryLang: null, enabledLangs: {} };
  return _clientState[slug];
}

// ══════════════════════════════════════════
// TOGGLE LANGUE — avec protection popup
// ══════════════════════════════════════════

let _pendingDisable = null;

async function onLangToggle(slug, lang, checkbox) {
  const state = getClientState(slug);
  const enabled = checkbox.checked;

  if (!enabled) {
    const client = CLIENTS.find(c => c.slug === slug);
    const remaining = (client.langs || []).filter(l => l !== lang && state.enabledLangs[l] !== false);
    if (remaining.length === 0) {
      checkbox.checked = true;
      return;
    }

    const isDefault = state.defaultLang === lang;
    const isPrimary = state.primaryLang === lang;

    if (isDefault || isPrimary) {
      _pendingDisable = { slug, lang, checkbox };
      const roles = [];
      if (isDefault) roles.push('la langue affichée (1ère visite)');
      if (isPrimary) roles.push('la langue admin (saisie)');
      document.getElementById('modal-msg').innerHTML =
        `<strong>${LANG_LABELS[lang]||lang}</strong> est actuellement ${roles.join(' et ')}.<br>Choisissez une langue de remplacement :`;
      const sel = document.getElementById('modal-sel');
      sel.innerHTML = remaining.map(l => `<option value="${l}">${LANG_LABELS[l]||l}</option>`).join('');
      document.getElementById('lang-modal').classList.add('open');
      return;
    }
  }

  await writeEnabledLang(slug, lang, enabled);
}

async function confirmLangDisable() {
  if (!_pendingDisable) return;
  const { slug, lang } = _pendingDisable;
  const state = getClientState(slug);
  const replacement = document.getElementById('modal-sel').value;

  await writeEnabledLang(slug, lang, false);
  if (state.defaultLang === lang) await writeDefaultLang(slug, replacement);
  if (state.primaryLang === lang) await writePrimaryLang(slug, replacement);

  document.getElementById('lang-modal').classList.remove('open');
  _pendingDisable = null;
}

function cancelLangDisable() {
  if (_pendingDisable) {
    _pendingDisable.checkbox.checked = true;
    _pendingDisable = null;
  }
  document.getElementById('lang-modal').classList.remove('open');
}

// ══════════════════════════════════════════
// INIT LISTENERS PAR CLIENT
// ══════════════════════════════════════════

function initClient(client) {
  const s  = client.slug;
  const id = s.replace(/-/g, '_');
  const db = getDb(s);

  // Modes disponibles (licence)
  db.ref('/config/features/modes').on('value', snap => {
    const modes = snap.val() || {};
    ['order','sonet','simple','paper'].forEach(mode => {
      const el = document.getElementById(`feat-mode-${mode}-${id}`);
      if (el) el.checked = modes[mode] !== false;
    });
  });

  // Boutons disponibles (licence)
  db.ref('/config/features/buttons').on('value', snap => {
    const buttons = snap.val() || {};
    ['callBtn','orderUI','photos'].forEach(btn => {
      const el = document.getElementById(`feat-btn-${btn}-${id}`);
      if (el) el.checked = buttons[btn] !== false;
    });
  });

  // Langue par défaut (menu visiteur)
  db.ref('/config/defaultLang').on('value', snap => {
    const val = snap.val();
    getClientState(s).defaultLang = val;
    const el = document.getElementById(`default-lang-${id}`);
    if (el && val) el.value = val;
  });

  // Langue principale (saisie admin)
  db.ref('/config/primaryLang').on('value', snap => {
    const val = snap.val();
    getClientState(s).primaryLang = val;
    const el = document.getElementById(`primary-lang-${id}`);
    if (el && val) el.value = val;
  });

  // Langues disponibles (toggles)
  db.ref('/config/enabledLangs').on('value', snap => {
    const enabledLangs = snap.val() || {};
    getClientState(s).enabledLangs = enabledLangs;
    (client.langs || []).forEach(l => {
      const el = document.getElementById(`lang-en-${l}-${id}`);
      if (el) el.checked = enabledLangs[l] !== false;
    });
  });

  // Statut
  checkStatus(client.url).then(online => {
    const dot = document.getElementById(`status-${id}`);
    if (dot) dot.classList.add(online ? 'online' : 'offline');
  });
}

// ══════════════════════════════════════════
// FIREBASE WRITES
// ══════════════════════════════════════════

const MODE_PRIORITY = ['order','sonet','simple','paper'];

async function writeFeatureMode(slug, mode, enabled) {
  const db = getDb(slug);
  await db.ref(`/config/features/modes/${mode}`).set(enabled).catch(console.error);

  if (!enabled) {
    // Si le mode actif vient d'être désactivé → basculer sur le prochain disponible
    const snap = await db.ref('/config/features/modes').once('value');
    const modes = snap.val() || {};
    const currentSnap = await db.ref('/menu/menuMode').once('value');
    const current = currentSnap.val() || 'paper';
    if (current === mode) {
      const next = MODE_PRIORITY.find(m => m !== mode && modes[m] !== false);
      if (next) {
        await db.ref('/menu/menuMode').set(next).catch(console.error);
      }
    }
  }
}

async function writeFeatureBtn(slug, btn, enabled) {
  const db = getDb(slug);
  await db.ref(`/config/features/buttons/${btn}`).set(enabled).catch(console.error);

  const keyMap = { callBtn: 'showCallBtn', orderUI: 'showOrderUI', photos: 'showPhotos' };
  const fireKey = keyMap[btn];
  if (fireKey) {
    await db.ref(`/menu/info/${fireKey}`).set(enabled).catch(console.error);
  }
}

async function writeDefaultLang(slug, lang) {
  await getDb(slug).ref('/config/defaultLang').set(lang).catch(console.error);
}

async function writePrimaryLang(slug, lang) {
  await getDb(slug).ref('/config/primaryLang').set(lang).catch(console.error);
}

async function writeEnabledLang(slug, lang, enabled) {
  await getDb(slug).ref(`/config/enabledLangs/${lang}`).set(enabled).catch(console.error);
}

async function updatePassword(slug) {
  const id       = slug.replace(/-/g, '_');
  const input    = document.getElementById(`pw-${id}`);
  const feedback = document.getElementById(`pwfb-${id}`);
  const btn      = input.nextElementSibling;

  const pw = input.value.trim();
  if (!pw) {
    feedback.textContent = 'Entrez un mot de passe.';
    feedback.className   = 'pw-feedback err';
    return;
  }

  btn.disabled         = true;
  feedback.textContent = '';

  try {
    const hash = await sha256(pw);
    await getDb(slug).ref('/config/adminHash').set(hash);
    feedback.textContent = '✓ Mis à jour';
    feedback.className   = 'pw-feedback ok';
    input.value          = '';
    setTimeout(() => { feedback.textContent = ''; }, 3000);
  } catch {
    feedback.textContent = 'Erreur Firebase';
    feedback.className   = 'pw-feedback err';
  } finally {
    btn.disabled = false;
  }
}

// ══════════════════════════════════════════
// DASHBOARD INIT
// ══════════════════════════════════════════

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display    = 'block';

  updateClock();
  setInterval(updateClock, 1000);

  const grid    = document.getElementById('clients-grid');
  grid.innerHTML = CLIENTS.map(buildCard).join('');
  CLIENTS.forEach(initClient);
}

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════

if (sessionStorage.getItem('ctrl_auth') === '1') {
  showDashboard();
}
